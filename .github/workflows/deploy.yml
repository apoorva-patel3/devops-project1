name: Full CI/CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: 13.233.195.70
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script:  |
         docker pull apoorvapatel3/dev-app
         docker stop $(docker ps -q) || true
         docker rm $(docker ps -aq) || true
         docker run -d -p 80:80 apoorvapatel3/dev-app
          cd ~
          ./deploy.sh
